<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cadastro de Parceiro - Clubbar</title>

  <style>

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #080808;
      color: white;
    }

    .container {

      max-width: 700px;

      margin: 60px auto;

      background: #111;

      border: 1px solid #222;

      border-radius: 24px;

      padding: 40px;
    }

    .logo {
      text-align: center;
      margin-bottom: 15px;
    }

    .logo img {
      height: 80px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 36px;
    }

    .subtitle {
      text-align: center;
      color: #bbb;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 22px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #f5c542;
    }

    input,
    select,
    textarea {

      width: 100%;

      padding: 16px;

      border-radius: 14px;

      border: 1px solid #2c2c2c;

      background: #1a1a1a;

      color: white;

      font-size: 16px;

      box-sizing: border-box;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {

      outline: none;

      border-color: #f5c542;
    }

    .btn {

      width: 100%;

      padding: 18px;

      border: none;

      border-radius: 40px;

      background: #f5c542;

      color: black;

      font-size: 18px;

      font-weight: bold;

      cursor: pointer;

      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.01);
      opacity: 0.95;
    }

    .voltar {
      text-align: center;
      margin-top: 25px;
    }

    .voltar a {
      color: #bbb;
      text-decoration: none;
    }

    .clubbar-toast {

      position: fixed;

      top: 30px;
      right: 30px;

      background: #111;

      border: 1px solid #f5c542;

      color: white;

      padding: 22px 26px;

      border-radius: 20px;

      z-index: 99999;

      box-shadow: 0 0 30px rgba(0,0,0,0.45);

      font-size: 16px;

      animation: fadeIn 0.3s ease;
    }

    .clubbar-toast strong {

      color: #f5c542;
      font-size: 18px;
    }

    @keyframes fadeIn {

      from {
        opacity: 0;
        transform: translateY(-10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }

      header {
        padding: 6px 8%;
        background: #000;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #222;
      }

    }

    @media(max-width: 768px) {

      .container {

        margin: 20px;

        padding: 25px;
      }

      h1 {
        font-size: 28px;
      }

      .subtitle {
        font-size: 15px;
      }

    .clubbar-toast {

        right: 12px;
        left: 12px;

        top: 12px;

        font-size: 14px;

        padding: 18px;
      }
  
    }

    .logo-area {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .logo-area img {
      height: 110px;
      display: block;
    }


  </style>

</head>

<body>

  <header>

      <div class="logo-area">
        <img src="logo_branca.png" alt="Clubbar Logo">
      </div>

  </header>

  <div class="container">

    
    <h1>Cadastro de Parceiro</h1>

    <div class="subtitle">
      Cadastre seu estabelecimento e conheça o ecossistema Clubbar
      para venda antecipada de produtos e ingressos.
    </div>

    <form id="formParceiro">

      <div class="form-group">
        <label>Nome do Responsável</label>

        <input
          type="text"
          id="nome_responsavel"
          required
        >
      </div>

      <div class="form-group">
        <label>Nome do Estabelecimento</label>

        <input
          type="text"
          id="nome_estabelecimento"
          required
        >
      </div>

      <div class="form-group">
        <label>Tipo</label>

        <select id="tipo" required>

          <option value="">Selecione</option>

          <option value="BAR">BAR</option>

          <option value="CASA_NOTURNA">
            CASA NOTURNA
          </option>

          <option value="EVENTO">
            EVENTO
          </option>

        </select>
      </div>

      <div class="form-group">
        <label>Telefone</label>

        <input
          type="text"
          id="telefone"
          required
        >
      </div>

      <div class="form-group">
        <label>E-mail</label>

        <input
          type="email"
          id="email"
          required
        >
      </div>

      <div class="form-group">
        <label>Cidade</label>

        <input
          type="text"
          id="cidade"
          required
        >
      </div>

      <div class="form-group">
        <label>Mensagem</label>

        <textarea
          id="mensagem"
          placeholder="Conte um pouco sobre seu estabelecimento..."
        ></textarea>
      </div>

      <button
        type="submit"
        class="btn"
      >
        Quero ser parceiro do Clubbar
      </button>

    </form>

    <div class="voltar">
      <a href="index.html">
        ← Voltar para o site
      </a>
    </div>

  </div>

  <script>

    document
      .getElementById('formParceiro')
      .addEventListener('submit', async function(e) {

        e.preventDefault();

        const btn = document.querySelector('.btn');

        btn.disabled = true;
        btn.innerText = 'Enviando cadastro...';

        const body = {

          nome_responsavel:
            document.getElementById('nome_responsavel').value,

          nome_estabelecimento:
            document.getElementById('nome_estabelecimento').value,

          tipo:
            document.getElementById('tipo').value,

          telefone:
            document.getElementById('telefone').value,

          email:
            document.getElementById('email').value,

          cidade:
            document.getElementById('cidade').value,

          mensagem:
            document.getElementById('mensagem').value,
        };

        console.log('BODY =>', body);

        try {

          const response = await fetch(
            'https://bitbeer-production.up.railway.app/parceiros/interesse',
            {
              method: 'POST',

              headers: {
                'Content-Type': 'application/json',
              },

              body: JSON.stringify(body),
            }
          );

          const data = await response.json();

          console.log('STATUS =>', response.status);
          console.log('RESPOSTA =>', data);

          if (!response.ok) {

            throw new Error(
              data.detail || 'Erro ao enviar cadastro'
            );
          }

          mostrarMensagem(
            'Entraremos em contato em breve 🚀'
          );

          document
            .getElementById('formParceiro')
            .reset();

        } catch (e) {

          console.error(e);

          alert(
            'Erro ao enviar cadastro: ' + e.message
          );

        } finally {

          btn.disabled = false;

          btn.innerText =
            'Quero ser parceiro Clubbar';
        }

      });

      function mostrarMensagem(texto) {

        const div = document.createElement('div');

        div.innerHTML = `
          <div class="clubbar-toast">
            <strong>CLUBBAR</strong><br><br>
            ${texto}
          </div>
        `;

        document.body.appendChild(div);

        setTimeout(() => {
          div.remove();
        }, 4000);
      }

  </script>

</body>
</html>
